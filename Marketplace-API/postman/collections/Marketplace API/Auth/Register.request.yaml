$kind: http-request
name: Register
url: "{{base_url}}/register"
method: POST
headers:
  Accept: appliation/json
body:
  type: json
  content: "{\r

    \    \"name\": \"Seller Satu\",\r

    \    \"email\": \"seller@example.com\",\r

    \    \"password\": \"password123\",\r

    \    \"password_confirmation\": \"password123\",\r

    \    \"role\": \"seller\"\r

    }"
scripts:
  - type: afterResponse
    code: "// Test 1: cek status code harus 201\r

      pm.test(\"Status code sesuai\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      // Test 2: cek response punya success: true\r

      pm.test(\"Response success true\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.success).to.eql(true);\r

      });\r

      \r

      // Script otomatis simpan token ke environment variable\r

      // pm.response.json() = ambil response body sebagai object JavaScript\r

      // jsonData.data.token = ambil nilai token dari response\r

      // pm.environment.set = simpan ke variabel environment yang aktif
      (Local)\r

      if (pm.response.code === 201) {\r

      \    var jsonData = pm.response.json();\r

      \    pm.environment.set(\"token\", jsonData.data.token);\r

      \    console.log(\"Token berhasil disimpan:\", jsonData.data.token);\r

      }"
    language: text/javascript
order: 1775363805399
