$kind: http-request
name: Login
url: "{{base_url}}/login"
method: POST
body:
  type: json
  content: "{\r

    \    \"email\": \"seller@example.com\",\r

    \    \"password\": \"password123\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code sesuai\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      pm.test(\"Response success true\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.success).to.eql(true);\r

      });\r

      \r

      // Script otomatis simpan token ke variabel environment\r

      // Setelah ini, {{token}} di semua request akan terisi otomatis\r

      if (pm.response.code === 200) {\r

      \    var jsonData = pm.response.json();\r

      \    pm.environment.set(\"token\", jsonData.data.token);\r

      \    console.log(\"Token tersimpan:\", jsonData.data.token);\r

      }"
    language: text/javascript
order: 2755178431790640
