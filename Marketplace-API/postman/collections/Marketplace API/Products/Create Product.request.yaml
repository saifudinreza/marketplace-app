$kind: http-request
name: Create Product
url: "{{base_url}}/products"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: "{\r

    \    \"name\": \"UI Kit Premium\",\r

    \    \"price\": 150000,\r

    \    \"description\": \"Paket UI Kit lengkap untuk desainer profesional\",\r

    \    \"file_url\": \"https://example.com/uikit-premium.zip\",\r

    \    \"category_id\": {{category_id}}\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code sesuai\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      pm.test(\"Response success true\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.success).to.eql(true);\r

      });\r

      \r

      // Simpan ID produk untuk dipakai di request Update & Delete\r

      if (pm.response.code === 201) {\r

      \    var jsonData = pm.response.json();\r

      \    pm.environment.set(\"product_id\", jsonData.data.id);\r

      \    console.log(\"Product ID tersimpan:\", jsonData.data.id);\r

      }"
    language: text/javascript
order: 4503497640074670
